# Netlify build configuration for the Next.js portfolio.
# The official @netlify/plugin-nextjs handles the publish directory and
# function wiring; no `publish` key here on purpose — that conflicts with
# the plugin in v5+.

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-fund --no-audit"
  NEXT_TELEMETRY_DISABLED = "1"

# Explicit declaration so the plugin loads even if auto-detection misses it.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Long-cache static assets (images, fonts, public/) — Netlify already
# fingerprints _next/static, but explicit headers for /images keep the
# CDN warm.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/Emmanuel-Aro-The-Nerd-CV.pdf"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Disposition = "attachment; filename=Emmanuel-Aro-The-Nerd-CV.pdf"
